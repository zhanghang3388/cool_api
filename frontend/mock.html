// ============ UTILITY COMPONENTS ============
function AnimatedNumber({ value, prefix = '', suffix = '', duration = 1500 }) {
    const [display, setDisplay] = React.useState(0);
    React.useEffect(() => {
        let start = 0;
        const step = value / (duration / 16);
        const timer = setInterval(() => {
            start += step;
            if (start >= value) { setDisplay(value); clearInterval(timer); }
            else { setDisplay(Math.floor(start)); }
        }, 16);
        return () => clearInterval(timer);
    }, [value]);
    return <span className="font-mono font-semibold">{prefix}{display.toLocaleString()}{suffix}</span>;
}

function StatusDot({ status }) {
    const colors = { active: 'bg-emerald-500 text-emerald-500', warning: 'bg-amber-500 text-amber-500', error: 'bg-rose-500 text-rose-500', disabled: 'bg-gray-500 text-gray-500', cached: 'bg-cyan-500 text-cyan-500', success: 'bg-emerald-500 text-emerald-500' };
    return <span className={`inline-block w-2 h-2 rounded-full ${colors[status]?.split(' ')[0] || 'bg-gray-500'} pulse-dot`}></span>;
}

function Toggle({ active, onToggle }) {
    return <div className={`toggle-switch ${active ? 'active' : ''}`} onClick={onToggle}></div>;
}

function Modal({ open, onClose, title, children }) {
    if (!open) return null;
    return (
        <div className="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4" onClick={onClose}>
            <div className="bg-base-100 border border-base-300 rounded-xl w-full max-w-lg slide-up" onClick={e => e.stopPropagation()}>

                    <button onClick={onClose} className="text-gray-400 hover:text-white transition-colors text-xl leading-none">&times;</button>
                </div>
                <div className="p-5">{children}</div>
            </div>
        </div>
    );
}

function GroupsPage() {
    const [groups, setGroups] = React.useState(mockGroups);
    const [showAdd, setShowAdd] = React.useState(false);
    const [editingId, setEditingId] = React.useState(null);
    const [form, setForm] = React.useState({ name: '', label: '', multiplier: 1.0, description: '' });
    const [previewModel, setPreviewModel] = React.useState(mockModels[0]);

    const resetForm = () => setForm({ name: '', label: '', multiplier: 1.0, description: '' });

    const openAdd = () => { resetForm(); setEditingId(null); setShowAdd(true); };
    const openEdit = (g) => { setForm({ name: g.name, label: g.label, multiplier: g.multiplier, description: g.description }); setEditingId(g.id); setShowAdd(true); };

    const saveGroup = () => {
        if (!form.name || !form.label) return;
        const mult = parseFloat(form.multiplier) || 1.0;
        if (editingId) {
            setGroups(groups.map(g => g.id === editingId ? { ...g, ...form, multiplier: mult } : g));
        } else {
            const newId = Math.max(0, ...groups.map(g => g.id)) + 1;
            setGroups([...groups, { id: newId, ...form, multiplier: mult, enabled: true }]);
        }
        setShowAdd(false);
        resetForm();
    };

    const deleteGroup = (id) => {
        if (groups.find(g => g.id === id)?.name === 'default') return;
        setGroups(groups.filter(g => g.id !== id));
    };

    const toggleEnabled = (id) => {
        setGroups(groups.map(g => g.id === id ? { ...g, enabled: !g.enabled } : g));
    };

    return (
        <div className="fade-in space-y-4">
            <div className="flex items-center justify-between">
                <h2 className="text-lg font-semibold">分组管理</h2>
                <button onClick={openAdd} className="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-black text-sm font-medium rounded-lg transition-colors">+ 添加分组</button>
            </div>

            <div className="stat-card rounded-xl p-4">
                <p className="text-xs text-gray-500 leading-relaxed">
                    <span className="text-amber-400">说明：</span>
                    分组用于给不同来源或用户群体设置独立的价格倍率。模型价格无需单独设置费率，最终价格 = 模型官方价格 × 分组倍率。
                    例如 <span className="font-mono text-gray-300">claude-opus-4-7</span> 官方价 <span className="font-mono">$15.00 / $75.00</span>，
                    <span className="font-mono text-gray-300">aws</span> 分组倍率 <span className="font-mono">0.4</span>，则实际价格为 <span className="font-mono text-emerald-400">$6.00 / $30.00</span>。
                </p>
            </div>

            <div className="stat-card rounded-xl overflow-hidden">
                <table className="w-full text-sm">
                    <thead><tr className="text-gray-500 text-xs border-b border-base-300 bg-base-200/50">
                        <th className="text-left p-4 font-medium">分组标识</th>
                        <th className="text-left p-4 font-medium">分组名称</th>
                        <th className="text-center p-4 font-medium">倍率</th>
                        <th className="text-left p-4 font-medium">描述</th>
                        <th className="text-center p-4 font-medium">启用</th>
                        <th className="text-center p-4 font-medium">操作</th>
                    </tr></thead>
                    <tbody>
                        {groups.map(g => (
                            <tr key={g.id} className="border-b border-base-300/50 hover:bg-base-200/30 transition-colors">
                                <td className="p-4">
                                    <span className="font-mono text-xs px-2 py-1 bg-base-200 rounded text-amber-400">{g.name}</span>
                                </td>
                                <td className="p-4 text-gray-200">{g.label}</td>

                                    <span className="font-mono text-sm text-amber-400">×{g.multiplier}</span>

                                    )}
                                </td>

                        ))}

                        className="bg-base-200 border border-base-300 rounded-lg px-3 py-1.5 text-xs font-mono text-gray-200 focus:outline-none focus:border-amber-500">
                        {mockModels.map(m => <option key={m.name} value={m.name}>{m.name}</option>)}
                    </select>
                </div>
                <div className="grid grid-cols-4 gap-3">
                    <div className="col-span-4 md:col-span-1 p-3 bg-base-200/50 rounded-lg border border-base-300/50">

                <div className="space-y-4">
                    <div><label className="text-xs text-gray-400 block mb-1">分组标识 (英文)</label>
                        <input value={form.name} onChange={e => setForm({...form, name: e.target.value})}
                            disabled={editingId && groups.find(g => g.id === editingId)?.name === 'default'}
                            className="w-full bg-base-200 border border-base-300 rounded-lg px-3 py-2 text-sm font-mono text-gray-200 focus:outline-none focus:border-amber-500 disabled:opacity-50" placeholder="aws"/></div>
                    <div><label className="text-xs text-gray-400 block mb-1">分组名称</label>
                        <input value={form.label} onChange={e => setForm({...form, label: e.target.value})}
                            className="w-full bg-base-200 border border-base-300 rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-amber-500" placeholder="AWS 分组"/></div>
                    <div><label className="text-xs text-gray-400 block mb-1">倍率</label>
                        <input type="number" step="0.01" min="0" value={form.multiplier} onChange={e => setForm({...form, multiplier: e.target.value})}
                            className="w-full bg-base-200 border border-base-300 rounded-lg px-3 py-2 text-sm font-mono text-amber-400 focus:outline-none focus:border-amber-500" placeholder="0.4"/>

                    <div><label className="text-xs text-gray-400 block mb-1">描述</label>

                        {editingId ? '保存修改' : '确认添加'}

                </div>
            </Modal>
        </div>
    );
}

                        <h3 className="text-sm font-medium text-gray-300 mb-3">最近充值记录</h3>
                        <div className="space-y-2 text-xs">
                            {[
                                { user: '张三', amount: 100, bonus: 15, time: '14:20', method: '支付宝' },
                                { user: '李四', amount: 500, bonus: 100, time: '13:45', method: '微信' },
                                { user: '赵六', amount: 50, bonus: 5, time: '11:30', method: '支付宝' },

}

// ============ MAIN APP ============
function App() {
    const [page, setPage] = React.useState('dashboard');

    React.useEffect(() => {
        lucide.createIcons();
    });

    const renderPage = () => {
        switch(page) {
            case 'dashboard': return <DashboardPage />;
            case 'channels': return <ChannelsPage />;
            case 'groups': return <GroupsPage />;
            case 'models': return <ModelsPage />;
            case 'users': return <UsersPage />;
            case 'cache': return <CachePage />;
            case 'payment': return <PaymentPage />;
            case 'settings': return <SettingsPage />;
            default: return <DashboardPage />;
        }
    };

    return (
        <div className="flex h-screen bg-dots">
            <Sidebar active={page} onNav={setPage} />
            <main className="ml-60 flex-1 overflow-y-auto scrollbar-thin p-6">
                <div className="max-w-[1400px] mx-auto">
                    {renderPage()}
                </div>
            </main>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
