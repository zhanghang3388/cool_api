server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # SPA bundle produced by `pnpm build`.
    root /usr/share/nginx/html;
    index index.html;

    # Aggressive caching for fingerprinted Vite assets.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # HTML must never be cached or users keep seeing stale bundles after deploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback so React Router works on hard reload.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip for text-ish responses. Binary assets (images/fonts) won't benefit.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
