services:
  postgres:
    image: postgres:16-alpine
    container_name: cool_api_db
    environment:
      POSTGRES_USER: cool_api
      POSTGRES_PASSWORD: cool_api
      POSTGRES_DB: cool_api
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cool_api"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: cool_api_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://cool_api:cool_api@postgres:5432/cool_api
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: cool_api_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
