# nginx-bootstrap.conf — used ONLY by `init-letsencrypt.sh` for the very first
# certificate issuance. Serves the ACME HTTP-01 challenge on :80 without any
# TLS config, so we don't hit the chicken-and-egg problem of nginx failing to
# start because it references cert files that don't exist yet.

worker_processes auto;
events { worker_connections 1024; }

http {
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 404;
        }
    }
}
