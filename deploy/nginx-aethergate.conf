# Host nginx site for AetherGate.
#
# Install:
#   sudo cp nginx-aethergate.conf /etc/nginx/sites-available/aethergate.conf
#   sudo sed -i 's/app\.example\.com/实际前端域名/g; s/api\.example\.com/实际API域名/g' \
#     /etc/nginx/sites-available/aethergate.conf
#   sudo ln -s /etc/nginx/sites-available/aethergate.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d app.example.com -d api.example.com
#
# The ACME HTTP-01 challenge will succeed because these server blocks listen
# on :80 first, then certbot rewrites them to add :443 ssl + redirect.
#
# Routing model:
#   app.example.com  →  static SPA  +  /v1/* proxy (so SDK users can set
#                       base_url to the frontend domain without exposing
#                       admin/console endpoints publicly)
#   api.example.com  →  full backend (admin UI talks here via VITE_API_BASE)

# Backend upstream — referenced by both server blocks below. Adjust when
# BACKEND_REPLICAS > 1 (add one 127.0.0.1:<port> entry per replica).
upstream aethergate_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ---------------- frontend ----------------
server {
    listen 80;
    listen [::]:80;
    server_name app.example.com;

    root /var/www/aethergate;
    index index.html;

    client_max_body_size 10m;

    # SDK forwarding endpoints. Same streaming-friendly settings as the
    # api.example.com block — SSE / chunked responses must hit the wire as
    # soon as upstream flushes. Must come BEFORE the SPA fallback so a
    # request to /v1/messages doesn't get served as index.html.
    location ~ ^/v1/ {
        proxy_pass http://aethergate_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_read_timeout 10m;
        proxy_send_timeout 10m;
        chunked_transfer_encoding on;
    }

    # Fingerprinted Vite assets — cache long.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # HTML must never be cached, or users keep loading stale bundles after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback so client-side routing survives a hard reload.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}

# ---------------- backend API ----------------

server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    client_max_body_size 10m;

    # Streaming endpoints — disable every buffer nginx has so SSE chunks
    # hit the browser the instant the upstream flushes.
    location ~ ^/v1/ {
        proxy_pass http://aethergate_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_read_timeout 10m;
        proxy_send_timeout 10m;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://aethergate_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 5m;
        proxy_send_timeout 5m;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json text/plain;
}
