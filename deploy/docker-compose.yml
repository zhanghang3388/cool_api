# Production stack — data + backend only.
#
# nginx + TLS (certbot) live on the HOST, not in compose. That keeps the
# familiar `nginx -t` / `systemctl reload nginx` workflow and makes TLS
# troubleshooting the same as every other host-managed site.
#
# All published ports bind to 127.0.0.1 so nothing is ever reachable from
# the public internet directly — host nginx is the only ingress.
#
# First-time setup: fill in `.env`, run `docker compose up -d --build`, then
# configure host nginx per `deploy/README.md` (copy nginx-aethergate.conf +
# run certbot --nginx).

name: aethergate

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"     # host-only, for psql debugging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"     # host-only, for redis-cli debugging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: aethergate-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BIND: 0.0.0.0:3000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-24}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ADMIN_INITIAL_USERNAME: ${ADMIN_INITIAL_USERNAME:-admin}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
      RUST_LOG: ${RUST_LOG:-info,aethergate=info}
    ports:
      - "127.0.0.1:3000:3000"     # host nginx proxies here
    deploy:
      replicas: ${BACKEND_REPLICAS:-1}

# frontend is built separately by `build-frontend.sh` and served as plain
# static files by host nginx — no container needed.

volumes:
  pgdata:
  redisdata:
